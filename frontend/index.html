<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Notes App (Frontend)</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; max-width: 980px; }
      .row { display: flex; gap: 16px; flex-wrap: wrap; }
      .card { border: 1px solid #ddd; border-radius: 10px; padding: 14px; flex: 1 1 320px; }
      input, textarea { width: 100%; box-sizing: border-box; margin-top: 6px; padding: 8px; }
      textarea { min-height: 120px; resize: vertical; }
      button { margin-top: 10px; padding: 10px 12px; cursor: pointer; }
      code { background: #f6f6f6; padding: 2px 6px; border-radius: 6px; }
      .muted { color: #666; font-size: 13px; }
      .status { margin-top: 12px; padding: 10px; border-radius: 8px; background: #f6faff; border: 1px solid #d9ecff; white-space: pre-wrap; }
      .danger { background: #fff5f5; border-color: #ffd0d0; }
      .notes { margin-top: 14px; display: grid; grid-template-columns: 1fr; gap: 10px; }
      .note-item { border: 1px solid #e6e6e6; border-radius: 10px; padding: 12px; }
      .note-item h4 { margin: 0 0 6px 0; }
      .note-item .meta { font-size: 12px; color: #666; display: flex; gap: 10px; flex-wrap: wrap; }
      .note-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
      .note-actions button { margin-top: 0; }
    </style>
  </head>
  <body>
    <h2>Notes App</h2>
    <p class="muted">
      Minimal frontend to test your backend APIs (JWT auth, notes CRUD, sharing, pin/unpin).
    </p>

    <div class="row">
      <div class="card">
        <h3>1) Auth</h3>
        <label>API Base URL</label>
        <input id="baseUrl" value="http://localhost:3000" />
        <div class="muted">Example: <code>https://your-app.onrender.com</code></div>

        <h4 style="margin-top:16px;">Register</h4>
        <input id="regEmail" placeholder="email" />
        <input id="regPassword" placeholder="password (min 8 chars)" type="password" />
        <button id="btnRegister">POST /register</button>

        <h4 style="margin-top:16px;">Login</h4>
        <input id="loginEmail" placeholder="email" />
        <input id="loginPassword" placeholder="password" type="password" />
        <button id="btnLogin">POST /login</button>

        <div class="muted" style="margin-top:12px;">Token (access_token)</div>
        <textarea id="token" placeholder="JWT token" style="min-height:90px"></textarea>
      </div>

      <div class="card">
        <h3>2) Notes</h3>

        <h4>Create / Update</h4>
        <input id="noteTitle" placeholder="title" maxlength="160" />
        <textarea id="noteContent" placeholder="content" maxlength="10000"></textarea>

        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <button id="btnCreate" style="flex:1 1 200px;">POST /notes</button>
          <input id="noteIdForUpdate" placeholder="note id (for update/delete/share/pin)" style="flex: 2 1 320px;" />
          <button id="btnUpdate" style="flex:1 1 160px;">PUT /notes/:id</button>
        </div>

        <div class="note-actions">
          <button id="btnDelete">DELETE /notes/:id</button>
          <button id="btnShare">POST /notes/:id/share</button>
        </div>

        <div style="margin-top:10px;">
          <input id="shareWithEmail" placeholder="share_with_email" />
        </div>

        <div class="note-actions">
          <button id="btnPin">POST /notes/:id/pin</button>
          <button id="btnUnpin">POST /notes/:id/unpin</button>
          <button id="btnFetch">GET /notes</button>
        </div>

        <div style="display:flex; gap:10px; margin-top:10px; flex-wrap:wrap;">
          <input id="searchQ" placeholder="Full-text search q" style="flex: 2 1 320px;" />
          <button id="btnSearch" style="flex:1 1 160px;">GET /search?q=</button>
        </div>

        <div id="status" class="status muted">Ready.</div>
      </div>
    </div>

    <div class="card" style="margin-top:16px;">
      <h3>3) Your Notes</h3>
      <div class="notes" id="notesList"></div>
    </div>

    <script type="module">
      const el = (id) => document.getElementById(id);
      const statusEl = el('status');
      const tokenEl = el('token');

      function setStatus(message, isError=false) {
        statusEl.textContent = message;
        statusEl.classList.toggle('danger', !!isError);
      }

      function getToken() {
        return (tokenEl.value || '').trim();
      }

      async function api(path, { method='GET', body=null } = {}) {
        const baseUrl = el('baseUrl').value.trim().replace(/\/$/, '');
        const headers = { 'Content-Type': 'application/json' };
        const token = getToken();
        if (token && token.length > 0) headers['Authorization'] = `Bearer ${token}`;

        const res = await fetch(baseUrl + path, {
          method,
          headers,
          body: body ? JSON.stringify(body) : undefined,
        });

        const text = await res.text();
        const data = text ? JSON.parse(text) : null;
        if (!res.ok) {
          const msg = data && data.message ? data.message : `${res.status} ${res.statusText}`;
          throw new Error(msg);
        }
        return data;
      }

      function renderNote(n) {
        const div = document.createElement('div');
        div.className = 'note-item';
        div.innerHTML = `
          <h4>${escapeHtml(n.title || '')}</h4>
          <div class="meta">
            <span><b>id:</b> ${escapeHtml(n.id)}</span>
            <span><b>pinned:</b> ${n.pinned ? 'yes' : 'no'}</span>
            <span>${escapeHtml(n.created_at || '')}</span>
            <span>${escapeHtml(n.updated_at || '')}</span>
          </div>
          <div style="margin-top:8px;">${escapeHtml(n.content || '')}</div>
          <div class="note-actions">
            <button data-action="select">Select</button>
          </div>
        `;
        div.querySelector('[data-action="select"]').addEventListener('click', () => {
          el('noteIdForUpdate').value = n.id;
          el('noteTitle').value = n.title || '';
          el('noteContent').value = n.content || '';
        });
        return div;
      }

      function escapeHtml(s) {
        return String(s)
          .replaceAll('&','&amp;')
          .replaceAll('<','<')
          .replaceAll('>','>')
          .replaceAll('"','"')
          .replaceAll("'",'&#039;');
      }

      async function fetchNotes() {
        const data = await api('/notes', { method: 'GET' });
        const list = el('notesList');
        list.innerHTML = '';
        (data || []).forEach((n) => list.appendChild(renderNote(n)));
        setStatus(`Fetched ${Array.isArray(data) ? data.length : 0} notes.`);
      }

      el('btnRegister').addEventListener('click', async () => {
        const email = el('regEmail').value.trim();
        const password = el('regPassword').value;
        try {
          const data = await api('/register', { method:'POST', body:{ email, password } });
          setStatus(JSON.stringify(data, null, 2));
        } catch (e) {
          setStatus(String(e.message || e), true);
        }
      });

      el('btnLogin').addEventListener('click', async () => {
        const email = el('loginEmail').value.trim();
        const password = el('loginPassword').value;
        try {
          const data = await api('/login', { method:'POST', body:{ email, password } });
          tokenEl.value = data.access_token || '';
          setStatus('Login successful. Token saved.');
        } catch (e) {
          setStatus(String(e.message || e), true);
        }
      });

      el('btnCreate').addEventListener('click', async () => {
        try {
          const data = await api('/notes', {
            method:'POST',
            body:{ title: el('noteTitle').value.trim(), content: el('noteContent').value },
          });
          setStatus('Created note: ' + JSON.stringify(data, null, 2));
          el('noteIdForUpdate').value = data.id;
          await fetchNotes();
        } catch (e) {
          setStatus(String(e.message || e), true);
        }
      });

      el('btnUpdate').addEventListener('click', async () => {
        const id = el('noteIdForUpdate').value.trim();
        try {
          const data = await api(`/notes/${encodeURIComponent(id)}`, {
            method:'PUT',
            body:{ title: el('noteTitle').value.trim(), content: el('noteContent').value },
          });
          setStatus('Updated note: ' + JSON.stringify(data, null, 2));
          await fetchNotes();
        } catch (e) {
          setStatus(String(e.message || e), true);
        }
      });

      el('btnDelete').addEventListener('click', async () => {
        const id = el('noteIdForUpdate').value.trim();
        try {
          await api(`/notes/${encodeURIComponent(id)}`, { method:'DELETE' });
          setStatus('Deleted note.');
          await fetchNotes();
        } catch (e) {
          setStatus(String(e.message || e), true);
        }
      });

      el('btnShare').addEventListener('click', async () => {
        const id = el('noteIdForUpdate').value.trim();
        const email = el('shareWithEmail').value.trim();
        try {
          const data = await api(`/notes/${encodeURIComponent(id)}/share`, {
            method:'POST',
            body:{ share_with_email: email },
          });
          setStatus('Shared: ' + JSON.stringify(data, null, 2));
          await fetchNotes();
        } catch (e) {
          setStatus(String(e.message || e), true);
        }
      });

      el('btnPin').addEventListener('click', async () => {
        const id = el('noteIdForUpdate').value.trim();
        try {
          const data = await api(`/notes/${encodeURIComponent(id)}/pin`, { method:'POST' });
          setStatus('Pinned: ' + JSON.stringify(data, null, 2));
          await fetchNotes();
        } catch (e) {
          setStatus(String(e.message || e), true);
        }
      });

      el('btnUnpin').addEventListener('click', async () => {
        const id = el('noteIdForUpdate').value.trim();
        try {
          const data = await api(`/notes/${encodeURIComponent(id)}/unpin`, { method:'POST' });
          setStatus('Unpinned: ' + JSON.stringify(data, null, 2));
          await fetchNotes();
        } catch (e) {
          setStatus(String(e.message || e), true);
        }
      });

      el('btnFetch').addEventListener('click', async () => {
        try {
          await fetchNotes();
        } catch (e) {
          setStatus(String(e.message || e), true);
        }
      });

      el('btnSearch').addEventListener('click', async () => {
        const q = el('searchQ').value;
        try {
          const data = await api(`/search?q=${encodeURIComponent(q)}`);
          const list = el('notesList');
          list.innerHTML = '';
          (data || []).forEach((n) => list.appendChild(renderNote(n)));
          setStatus(`Search results: ${Array.isArray(data) ? data.length : 0} notes.`);
        } catch (e) {
          setStatus(String(e.message || e), true);
        }
      });

      // auto-load notes if token is already filled
      if (getToken()) {
        fetchNotes().catch((e) => setStatus(String(e.message || e), true));
      }
    </script>
  </body>
</html>
